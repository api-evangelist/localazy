description: >-
  FinOps view of Localazy spend. Localazy bills on a subscription basis priced by
  the number of source keys managed across all projects, not per request or per
  translated word. Translating a source key into additional languages does not
  increase the source-key count, and target languages are unlimited. Plan tiers
  (Free, Professional, Autopilot, Business, Enterprise) bundle source-key limits
  and per-project daily API request ceilings. API usage itself is included in the
  subscription, with daily import and fetch ceilings rather than metered charges.
notes: >-
  Source-key limits and plan prices are subject to change; verify against the
  Localazy pricing page during reconciliation. Cost optimization centers on
  staying within a tier's source-key allowance and using the Localazy CDN for
  production fetches.
