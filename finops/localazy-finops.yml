meters:
- name: source_keys
  description: Source keys (unique source strings) managed across all projects; the primary billing metric.
  unit: keys
  aggregation: max
  dimensions:
  - account
  - project
- name: import_requests
  description: Import/upload API requests counted per project per day against the plan ceiling.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - project
- name: fetch_requests
  description: Fetch/export API requests counted per project per day against the plan ceiling.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - project
- name: subscription_seats
  description: User seats included with every plan at no additional cost (unlimited).
  unit: seats
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track source-key consumption across projects against the plan allowance in the Localazy dashboard.
- name: Allocation
  description: Use separate projects and tokens per product/team to attribute source-key usage and API request volume.
- name: Optimization
  description: Consolidate duplicate source keys; rely on unlimited target languages; use the Localazy CDN for production fetches to avoid daily fetch ceilings; right-size the plan tier to actual source-key counts.
- name: Accountability
  description: Assign owners per project; review source-key growth before it crosses a tier boundary to avoid unplanned upgrades.
