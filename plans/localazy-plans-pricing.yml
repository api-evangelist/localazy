    Core localization features for small, open-source, and nonprofit projects,
    with API access at the lowest daily request ceilings.
  entries:
  - label: Source Keys
    name: source_keys
    type: limit
    metric: source_keys
    limit: 200
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
  - label: Import Requests
    name: import_requests
    type: limit
    metric: requests
    limit: 100
    timeFrame: day
    geo: global
    unit: 1
    price: included
    userMultiplied: false
