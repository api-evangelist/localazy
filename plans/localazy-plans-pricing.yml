specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Localazy
providerId: localazy
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Localization
- Translation
- Internationalization
- i18n
- L10n
- Translation Management
- Plans
description: >-
  Localazy uses subscription tiers priced on the number of source keys managed
  across all projects. One source key translated into many languages still
  counts as a single source key, and translations to additional languages are
  unlimited and do not increase the source-key count. All plans include
  unlimited seats. Paid plans include a trial; the Business plan offers a 14-day
  trial. API access (import/upload, export/download, files, languages, projects)
  is available across plans, with per-project daily import and fetch request
  ceilings that scale by tier.
notes: >-
  Prices and source-key limits reflect the public Localazy pricing page and are
  subject to change; verify on reconciliation. Annual billing offers roughly two
  months of savings versus monthly.
sources:
- https://localazy.com/pricing
- https://localazy.com/docs/api/limits
plans:
