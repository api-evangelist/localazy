aid: localazy
url: https://raw.githubusercontent.com/api-evangelist/localazy/refs/heads/main/apis.yml
name: Localazy
kind: company
description: Localazy is a localization and translation management platform built for
  developers. Its REST API at https://api.localazy.com lets teams import and upload
  source content, export and download translated files, list and manage files, languages,
  and projects, and drive AI-assisted translation - all authenticated with project,
  translation, or organization tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Localization
- Translation
- Internationalization
- i18n
- L10n
- Translation Management
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
